<script>
(function (w) {
	var FADE_MS = 450;
	var REMOVE_PAD_MS = 200;
	var DEFAULT_SEC = 10;
	var POS = ['bottom_center', 'bottom_right', 'top_center', 'top_right'];

	function normalizePos(p) {
		p = (p == null || p === '') ? 'bottom_center' : String(p).replace(/-/g, '_');
		if (POS.indexOf(p) === -1) {
			p = 'bottom_center';
		}
		return p;
	}

	function ensureHost(pos) {
		var id = 'g5ToastHost_' + pos;
		var el = document.getElementById(id);
		if (!el) {
			el = document.createElement('div');
			el.id = id;
			el.className = 'g5-toast-host g5-toast-host--' + pos;
			el.setAttribute('aria-live', 'polite');
			document.body.appendChild(el);
		} else if (el.parentNode !== document.body) {
			document.body.appendChild(el);
		}
		return el;
	}

	var toastTimers = [];

	function forgetRec(rec) {
		for (var i = toastTimers.length - 1; i >= 0; i--) {
			if (toastTimers[i] === rec) {
				toastTimers.splice(i, 1);
				break;
			}
		}
	}

	w.showToast = function (message, timeoutSeconds, position) {
		var msg = message == null ? '' : String(message);
		var sec = timeoutSeconds;
		if (sec == null || sec === '' || (typeof sec === 'number' && isNaN(sec))) {
			sec = DEFAULT_SEC;
		} else {
			sec = parseFloat(sec);
		}
		if (!isFinite(sec) || sec <= 0) {
			sec = DEFAULT_SEC;
		}
		var toastShowMs = Math.max(500, Math.round(sec * 1000));
		var pos = normalizePos(position);
		var host = ensureHost(pos);
		var el = document.createElement('div');
		el.className = 'g5-toast';
		el.textContent = msg;
		var rec = { el: el, t1: null, t2: null };
		host.appendChild(el);
		requestAnimationFrame(function () {
			el.classList.add('g5-toast--in');
		});
		rec.t1 = setTimeout(function () {
			el.classList.add('g5-toast--fade');
		}, toastShowMs);
		rec.t2 = setTimeout(function () {
			if (el.parentNode) {
				el.parentNode.removeChild(el);
			}
			forgetRec(rec);
		}, toastShowMs + FADE_MS + REMOVE_PAD_MS);
		toastTimers.push(rec);
	};

	w.hideToast = function () {
		var i;
		for (i = 0; i < toastTimers.length; i++) {
			clearTimeout(toastTimers[i].t1);
			clearTimeout(toastTimers[i].t2);
			var el = toastTimers[i].el;
			if (el && el.parentNode) {
				el.parentNode.removeChild(el);
			}
		}
		toastTimers = [];
		for (i = 0; i < POS.length; i++) {
			var h = document.getElementById('g5ToastHost_' + POS[i]);
			if (h) {
				while (h.firstChild) {
					h.removeChild(h.firstChild);
				}
			}
		}
	};
